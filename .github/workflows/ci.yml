name: ci

on:
  push:
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - run: uv sync --extra dev
      - run: uv run ruff check feedback_app tools tests migrations
      - run: uv run pytest
      - run: DATABASE_URL=sqlite:///./ci-migration.db uv run alembic upgrade head
      - run: DATABASE_URL=sqlite:///./ci-migration.db uv run alembic check

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm audit --audit-level=moderate
      - run: npm run lint
      - run: npm run build

