name: ci

on:
  push:
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v8.3.0
      - run: uv sync --frozen --extra dev
      - run: uv run ruff check feedback_app tools tests migrations
      - run: uv run pytest
      - run: DATABASE_URL=sqlite:///./ci-migration.db uv run alembic upgrade head
      - run: DATABASE_URL=sqlite:///./ci-migration.db uv run alembic check

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm audit --audit-level=moderate
      - run: npm run lint
      - run: npm run build



      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          projectBaseDir: .
          args: >
            -Dsonar.organization=metratio
            -Dsonar.projectKey=metratio_feedback-analysis-agent
            -Dsonar.sources=feedback_app,tools,migrations
            -Dsonar.tests=tests
